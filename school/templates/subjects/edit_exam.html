{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center"><div class="col"><h3 class="page-title">Edit Exam</h3></div></div>
        </div>
        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12"><h5 class="form-title"><span>Editing: {{ exam.name }}</span></h5></div>
                                {% for field in form %}
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>{{ field.label }}</label>
                                        {{ field }}
                                        <small class="text-danger">{{ field.errors|striptags }}</small>
                                    </div>
                                </div>
                                {% endfor %}
                                <div class="col-12 mt-3"><button type="submit" class="btn btn-primary">Update Exam</button></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
