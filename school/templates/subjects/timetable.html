{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Weekly Visual Timetable</h3>
                </div>
                {% if not request.user.is_student %}
                <div class="col-auto text-right float-right ml-auto">
                    <a href="{% url 'add_timetable' %}" class="btn btn-primary"><i class="fas fa-plus"></i> Add Class</a>
                </div>
                {% endif %}
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <div id="timetable"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('timetable');
        
        // Parse the JSON data passed from the Django view
        var eventsData = JSON.parse('{{ events_json|escapejs }}');

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            slotMinTime: '08:00:00',
            slotMaxTime: '18:00:00',
            hiddenDays: [0, 6], // Hide Sunday(0) and Saturday(6)
            allDaySlot: false,
            events: eventsData,
            headerToolbar: {
                left: '',
                center: 'title',
                right: ''
            }
        });
        
        calendar.render();
    });
</script>
      
      
      
      
      
{% endblock %}
